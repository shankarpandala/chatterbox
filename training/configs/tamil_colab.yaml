# Google Colab (CUDA) variant of configs/tamil.yaml.
#
# Same pipeline as the Mac config, tuned for a Colab GPU: CUDA + mixed precision
# and a longer schedule (GPUs are much faster than MPS). batch_size stays 1
# because the custom T3.forward has no attention mask (see training/dataset.py);
# use grad_accum for a larger effective batch.
#
# Colab is ephemeral -> point `work_dir` at mounted Google Drive (see the Colab
# quickstart in training/README.md) so checkpoints survive a disconnect.

language: ta
language_name: Tamil

base_repo: ResembleAI/chatterbox
base_t3: t3_mtl23ls_v2.safetensors

paths:
  # Persist across Colab disconnects by mounting Drive and using a Drive path,
  # e.g. /content/drive/MyDrive/chatterbox_runs/tamil
  work_dir: ./runs/tamil
  manifest: ./runs/tamil/manifest.jsonl
  tokenizer: ./runs/tamil/grapheme_mtl_merged_expanded_v1.json
  features: ./runs/tamil/features
  feature_index: ./runs/tamil/features/index.jsonl
  checkpoints: ./runs/tamil/checkpoints
  export: ./runs/tamil/export

device: cuda
precision: fp16              # T4-safe. Use bf16 on A100/L4 (faster + more stable).

precompute:
  reference: other_same_speaker

train:
  batch_size: 1              # keep 1 (see module docstring); raise grad_accum instead
  grad_accum: 16
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 40000           # GPUs are fast; train longer than on a Mac
  warmup_steps: 1000
  grad_clip: 1.0
  save_every: 2000
  log_every: 50
  max_audio_seconds: 16
  speech_loss_weight: 1.0
  text_loss_weight: 0.1
  seed: 1234
  num_workers: 2
  lora:
    enabled: true
    rank: 32                 # a bit larger than the Mac config (more capacity)
    alpha: 64
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  train_text_embeddings: true
  train_text_head: true

eval_sentences:
  - "வணக்கம், இன்று எப்படி இருக்கிறீர்கள்?"
  - "நான் office போறேன், evening meeting இருக்கு."
  - "இந்த project-ஐ நாளைக்கு finish பண்ண வேண்டும்."

upload:
  repo_id: null
  private: true
  license: other
